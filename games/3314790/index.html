<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>3314790</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
</head>
  <body>
    <div id="loading-text"
    style="color: rgb(255, 255, 255); font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING...
  </div>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=540 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var loadingText = document.querySelector("#loading-text");
      let loadedBytes = 0;
      const CACHE_DB = 'CloverPitCache';
      const CACHE_STORE = 'files';
      const CACHE_VERSION = 1;
      let dbPromise = null;

      function initIndexedDB() {
        if (dbPromise) return dbPromise;

        dbPromise = new Promise((resolve, reject) => {
          const request = indexedDB.open(CACHE_DB, CACHE_VERSION);

          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result);
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(CACHE_STORE)) {
              db.createObjectStore(CACHE_STORE);
            }
          };
        });

        return dbPromise;
      }

      function getFromCache(key) {
        return initIndexedDB().then((db) => {
          return new Promise((resolve) => {
            const tx = db.transaction(CACHE_STORE, 'readonly');
            const store = tx.objectStore(CACHE_STORE);
            const request = store.get(key);

            request.onsuccess = () => resolve(request.result || null);
            request.onerror = () => resolve(null);
          });
        }).catch(() => null);
      }

      function saveToCache(key, blob) {
        return initIndexedDB().then((db) => {
          return new Promise((resolve) => {
            const tx = db.transaction(CACHE_STORE, 'readwrite');
            const store = tx.objectStore(CACHE_STORE);
            const request = store.put(blob, key);

            request.onsuccess = () => resolve(true);
            request.onerror = () => resolve(false);
          });
        }).catch(() => false);
      }

      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        let chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);

          const mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
          const mbTotal = '86.96';
          loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
        }

        const fullBuffer = new Uint8Array(received);
        let offset = 0;

        for (let chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }

        return fullBuffer.buffer;
      }

      async function mergeFiles(fileParts, cacheKey) {
        const cachedBlob = await getFromCache(cacheKey);
        if (cachedBlob) {
          return URL.createObjectURL(cachedBlob);
        }

        const buffers = [];
        for (const part of fileParts) {
          buffers.push(await fetchWithProgress(part));
        }

        const mergedBlob = new Blob(buffers);
        await saveToCache(cacheKey, mergedBlob);
        return URL.createObjectURL(mergedBlob);
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }

      (async () => {
        const [dataUrl, wasmUrl] = await Promise.all([
          mergeFiles(getParts("Build/CloverPit.data", 1, 3), "CloverPit.data"),
          mergeFiles(getParts("Build/CloverPit.wasm", 1, 3), "CloverPit.wasm"),
        ]);

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/CloverPit.loader.js";
        var config = {
          arguments: [],
          dataUrl: dataUrl,
          frameworkUrl: buildUrl + "/CloverPit.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Panik Arcade",
          productName: "CloverPit",
          productVersion: "1.3",
          showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            loadingText.remove();
          }).catch((message) => {
          });
        };
        document.body.appendChild(script);
      })();
    </script>
</html>
