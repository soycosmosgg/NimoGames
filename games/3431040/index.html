<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>3431040</title>
    <base href="https://cdn-slyte.pages.dev/3431040/">
    <link rel="stylesheet" href="style.css">
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="assets/images/icon3.png" />
    <link rel="apple-touch-icon" href="assets/images/icon2.png" />
</head>

<body>
    <script>
        (function () {
            if (window.__slyteCachedFetchEnabled) {
                return;
            }
            window.__slyteCachedFetchEnabled = true;

            const originalFetch = window.fetch.bind(window);
            const DB_NAME = 'BuckshotRouletteCache';
            const DB_VERSION = 1;
            const STORE_NAME = 'files';
            let dbPromise = null;

            function openDb() {
                if (dbPromise) {
                    return dbPromise;
                }

                dbPromise = new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                });

                return dbPromise;
            }

            function shouldCache(url) {
                const pathname = url.pathname || '';
                return pathname.includes('gamedata');
            }

            function getContentType(url) {
                const pathname = url.pathname || '';
                if (pathname.endsWith('.wasm')) {
                    return 'application/wasm';
                }
                if (pathname.endsWith('.pck')) {
                    return 'application/octet-stream';
                }
                if (pathname.endsWith('.js')) {
                    return 'application/javascript';
                }
                return 'application/octet-stream';
            }

            async function getCachedResponse(url) {
                try {
                    const db = await openDb();
                    return await new Promise((resolve) => {
                        const tx = db.transaction(STORE_NAME, 'readonly');
                        const store = tx.objectStore(STORE_NAME);
                        const request = store.get(url.href);
                        request.onsuccess = () => resolve(request.result || null);
                        request.onerror = () => resolve(null);
                    });
                } catch (error) {
                    return null;
                }
            }

            async function setCachedResponse(url, blob) {
                try {
                    const db = await openDb();
                    await new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE_NAME, 'readwrite');
                        const store = tx.objectStore(STORE_NAME);
                        const request = store.put(blob, url.href);
                        request.onsuccess = () => resolve();
                        request.onerror = () => reject(request.error);
                    });
                } catch (error) {
                    console.warn('No se pudo guardar en cache:', url.href, error);
                }
            }

            window.fetch = async function (input, init) {
                const request = typeof input === 'string' ? new Request(input, init) : input;
                const url = new URL(request.url, window.location.href);

                if (!shouldCache(url)) {
                    return originalFetch(request, init);
                }

                const cachedBlob = await getCachedResponse(url);
                if (cachedBlob) {
                    return new Response(cachedBlob, {
                        status: 200,
                        statusText: 'OK',
                        headers: {
                            'Content-Type': getContentType(url)
                        }
                    });
                }

                const response = await originalFetch(request, init);
                if (!response.ok) {
                    return response;
                }

                const blob = await response.clone().blob();
                await setCachedResponse(url, blob);

                return new Response(blob, {
                    status: response.status,
                    statusText: response.statusText,
                    headers: response.headers
                });
            };
        })();
    </script>
    <script src="main.js"></script>
    <div id="loading-text" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-family: cursive; font-size: 64px; font-weight: 700; text-align: center; z-index: 9999; pointer-events: none;">LOADING...</div>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>
    <noscript> Your browser does not support JavaScript. </noscript>
    <div id="status">
        <img id="status-splash" class="show-image--true fullsize--false use-filter--true" src="assets/images/logo.png" alt="">
        <div id="progress-bar-empty">
            <div id="progress-bar-full"></div>
        </div>
        <progress id="status-progress"></progress>
        <div id="status-notice"></div>
    </div>
    <script src="assets/scripts/data.js"></script>
    <script>
        const GODOT_CONFIG = {
            "args": [],
            "canvasResizePolicy": 2,
            "ensureCrossOriginIsolationHeaders": false,
            "executable": "gamedata",
            "experimentalVK": false,
            "fileSizes": {
                "gamedata.pck": 410934256,
                "gamedata.wasm": 43444261
            },
            "focusCanvas": true,
            "gdextensionLibs": []
        };
        const GODOT_THREADS_ENABLED = false;
        const engine = new Engine(GODOT_CONFIG);
        window.godotrunfunction = function () {
            const loadingText = document.getElementById('loading-text');
            const statusOverlay = document.getElementById('status');
            const statusProgress = document.getElementById('status-progress');
            const statusNotice = document.getElementById('status-notice');
            statusOverlay.style.display = 'none';
            let initializing = true;
            let statusMode = '';

            function hideLoadingText() {
                if (loadingText) {
                    loadingText.style.display = 'none';
                }
            }

            function setStatusMode(mode) {
                if (statusMode === mode || !initializing) {
                    return;
                }
                if (mode === 'hidden') {
                    statusOverlay.remove();
                    hideLoadingText();
                    initializing = false;
                    return;
                }
                hideLoadingText();
                statusOverlay.style.visibility = 'visible';
                statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
                statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
                statusMode = mode;
            }

            function setStatusNotice(text) {
                while (statusNotice.lastChild) {
                    statusNotice.removeChild(statusNotice.lastChild);
                }
                const lines = text.split('\n');
                lines.forEach((line) => {
                    statusNotice.appendChild(document.createTextNode(line));
                    statusNotice.appendChild(document.createElement('br'));
                });
            }

            function displayFailureNotice(err) {
                console.error(err);
                if (err instanceof Error) {
                    setStatusNotice(err.message);
                } else if (typeof err === 'string') {
                    setStatusNotice(err);
                } else {
                    setStatusNotice('An unknown error occurred.');
                }
                setStatusMode('notice');
                initializing = false;
            }
            const missing = Engine.getMissingFeatures({
                threads: GODOT_THREADS_ENABLED,
            });
            if (missing.length !== 0) {
                if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
                    let serviceWorkerRegistrationPromise;
                    try {
                        serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
                    } catch (err) {
                        serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
                    }
                    // There's a chance that installing the service worker would fix the issue
                    Promise.race([
                        serviceWorkerRegistrationPromise.then((registration) => {
                            if (registration != null) {
                                return Promise.reject(new Error('Service worker already exists.'));
                            }
                            return registration;
                        }).then(() => engine.installServiceWorker()),
                        // For some reason, `getRegistration()` can stall
                        new Promise((resolve) => {
                            setTimeout(() => resolve(), 2000);
                        }),
                    ]).then(() => {
                        // Reload if there was no error.
                        window.location.reload();
                    }).catch((err) => {
                        console.error('Error while registering service worker:', err);
                    });
                } else {
                    // Display the message as usual
                    const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
                    displayFailureNotice(missingMsg + missing.join('\n'));
                }
            } else {
                setStatusMode('progress');
                engine.startGame({
                    'onProgress': function (current, total) {
                        if (current > 0 && total > 0) {
                            statusProgress.value = current;
                            statusProgress.max = total;
                            const barFull = document.getElementById("progress-bar-full");
                            const percent = (current / total) * 100;
                            barFull.style.width = percent + "%";

                        } else {
                            statusProgress.removeAttribute('value');
                            statusProgress.removeAttribute('max');
                        }
                    },
                }).then(() => {
                    setStatusMode('hidden');
                }, displayFailureNotice);
            }
        };
    </script>
</body>

</html>
