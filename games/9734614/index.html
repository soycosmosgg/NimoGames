                `                }`,

                `                return self.POLYTRACK_BASE_URL + path.replace('./', '');`,

                `            };`,
                `        }`,

                `        return __ORIGINAL_PolyTrackPhysics(options);`,
                `    };`,
                `};`
            ].join('\n');
            const patchedText = workerPrefix + '\n' + text

                    return `importScripts(${quote}${baseUrl}lib/polytrack_physics.js${quote});\n` +
                        `self.__POLYTRACK_WRAP();`;f

            const blob = new Blob([patchedText], { type: 'application/javascript' });

        const ogworker = window.Worker;
        function createSimulationWorkerProxy(options) {
            let realWorker = null;
            const pendingCalls = [];
            const pendingSets = [];
            const proxy = new Proxy({ onmessage: null, onerror: null, onmessageerror: null }, {
                get(target, prop) {
                    if (prop === 'then') return undefined;
                    if (realWorker) {
                        const value = realWorker[prop];
                        return typeof value === 'function' ? value.bind(realWorker) : value;
                    }
                    if (prop === 'postMessage' || prop === 'terminate' || prop === 'addEventListener' || prop === 'removeEventListener') {
                        return (...args) => {
                            pendingCalls.push({ name: prop, args });
                        };
                    }
                    return target[prop];
                },
                set(target, prop, value) {
                    if (prop === 'onmessage' || prop === 'onerror' || prop === 'onmessageerror') {
                        target[prop] = value;
                        if (realWorker) realWorker[prop] = value;
                        return true;
                    }
                    pendingSets.push({ name: prop, value });
                    if (realWorker) realWorker[prop] = value;
                    return true;
                }
            });

            simulationWorkerReady.then(workerUrl => {
                realWorker = new ogworker(workerUrl, options);
                pendingCalls.forEach(call => {
                    if (typeof realWorker[call.name] === 'function') {
                        realWorker[call.name](...call.args);
                    }
                });
                pendingSets.forEach(set => {
                    realWorker[set.name] = set.value;
                });
                if (proxy.onmessage) realWorker.onmessage = proxy.onmessage;
                if (proxy.onerror) realWorker.onerror = proxy.onerror;
                if (proxy.onmessageerror) realWorker.onmessageerror = proxy.onmessageerror;
            }).catch(() => {
                console.error('Simulation worker failed to initialize');
            });

            return proxy;
        }

        function isSimulationWorkerScript(scriptUrl) {
            if (typeof scriptUrl === 'string') {
                return scriptUrl.toLowerCase().endsWith('simulation_worker.bundle.js');
            }
            if (scriptUrl instanceof URL) {
                return scriptUrl.pathname.toLowerCase().endsWith('simulation_worker.bundle.js');
            }
            if (scriptUrl instanceof Request) {
                return scriptUrl.url.toLowerCase().endsWith('simulation_worker.bundle.js');
            }
            return false;
        }

        window.Worker = function (scriptUrl, options) {
            if (isSimulationWorkerScript(scriptUrl)) {
                return createSimulationWorkerProxy(options);
            }
            return new ogworker(scriptUrl, options);
        };
        window.Worker.prototype = ogworker.prototype;
